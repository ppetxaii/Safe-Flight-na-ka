<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Flight to Khon Kaen ✈️</title>
    <style>
        :root {
            --airline-blue: #003580;
            --sky-light: #e3f2fd;
            --accent-gold: #ffd700;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(180deg, #bbdefb 0%, #ffffff 100%);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .ticket-card {
            background: white;
            width: 90%;
            max-width: 450px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
            z-index: 2;
        }

        .ticket-header {
            background: var(--airline-blue);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .route-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 30px;
            position: relative;
        }

        .airport-code {
            text-align: center;
        }

        .airport-code h2 {
            margin: 0;
            font-size: 2.5rem;
            color: var(--airline-blue);
        }

        .airport-code p {
            margin: 5px 0 0;
            font-size: 0.8rem;
            color: #666;
        }

        .flight-path {
            flex-grow: 1;
            height: 2px;
            background: repeating-linear-gradient(90deg, #ccc, #ccc 5px, transparent 5px, transparent 10px);
            margin: 0 15px;
            position: relative;
        }

        .profile-move-img {
            position: absolute;
            top: -30px;
            left: 0;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            object-fit: cover;
            animation: planeMove 4s ease-in-out infinite;
        }

        @keyframes planeMove {
            0% { left: 0%; transform: rotate(-5deg); }
            50% { left: 45%; transform: translateY(-15px) rotate(5deg); }
            100% { left: 85%; transform: rotate(-5deg); }
        }

        .info-content {
            padding: 0 30px 30px;
            text-align: center;
        }

        .message-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            color: #444;
            line-height: 1.8;
            font-size: 0.95rem;
            margin-bottom: 20px;
            text-align: left;
            border-left: 5px solid var(--airline-blue);
        }

        .btn-checkin {
            background: var(--airline-blue);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }

        .btn-checkin:hover {
            background: #00235a;
            transform: scale(1.02);
        }

        /* ส่วนแสดงรูปเซอร์ไพรส์ */
        #memory-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none; /* ซ่อนไว้ก่อนกด */
            justify-content: center;
            align-items: center;
            z-index: 100;
            flex-direction: column;
            cursor: pointer;
        }

        .memory-img {
            max-width: 85%;
            max-height: 70%;
            border: 10px solid white;
            border-bottom: 50px solid white; /* สไตล์โพลารอยด์ */
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: zoomIn 0.5s ease;
        }

        .memory-text {
            color: white;
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        @keyframes zoomIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .cloud {
            position: absolute;
            color: white;
            font-size: 30px;
            pointer-events: none;
            z-index: 1;
            animation: cloudFloat 10s linear infinite;
        }

        @keyframes cloudFloat {
            from { transform: translateX(-10vw); opacity: 0.8; }
            to { transform: translateX(110vw); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="memory-overlay" onclick="closeMemory()">
        <img src="cat.jpg" alt="Memory" class="memory-img">
        <div class="memory-text">送给你 💙</div>
    </div>

    <div class="ticket-card">
        <div class="ticket-header">
            <span>BOARDING PASS - FOR P'JENNY 💙</span>
        </div>

        <div class="route-container">
            <div class="airport-code">
                <h2>BKK</h2>
                <p>Bangkok</p>
            </div>

            <div class="flight-path">
                <img src="sfsf.png" alt="P'Jenny" class="profile-move-img">
            </div>

            <div class="airport-code">
                <h2>KKC</h2>
                <p>Khon Kaen</p>
            </div>
        </div>

        <div class="info-content">
            <div class="message-box">
                <span id="typed-text"></span>
            </div>
            <button class="btn-checkin" onclick="happyEnding()"> Click Click 🌸</button>
        </div>
    </div>

    <script>
        const text = `太棒了！恭喜姐姐实习结束 ❤️\n一路平安，祝姐姐旅途愉快！✈️☁️\n\n[Flight Info]: BKK ✈️ KKC\nหวังว่าจะเป็นประสบการณ์ที่ดีนะคะ\nสู้ๆกับการทำโปรเจกต์จบนะค้าบบบ ✨`;
        let index = 0;

        function typeWriter() {
            if (index < text.length) {
                let char = text.charAt(index);
                document.getElementById("typed-text").innerHTML += char === "\n" ? "<br>" : char;
                index++;
                setTimeout(typeWriter, 50);
            }
        }

        window.onload = function() {
            typeWriter();
            for(let i=0; i<5; i++) {
                createCloud();
            }
        };

        function createCloud() {
            const cloud = document.createElement('div');
            cloud.classList.add('cloud');
            cloud.innerHTML = '☁️';
            cloud.style.top = Math.random() * 100 + 'vh';
            cloud.style.left = '-50px';
            cloud.style.fontSize = (Math.random() * 40 + 20) + 'px';
            cloud.style.animationDuration = (Math.random() * 10 + 10) + 's';
            document.body.appendChild(cloud);
            setTimeout(() => cloud.remove(), 20000);
        }

        setInterval(createCloud, 3000);

        function happyEnding() {
            // แสดงรูปภาพขึ้นมาแทนการใช้ alert
            document.getElementById('memory-overlay').style.display = 'flex';
            
            // เอฟเฟกต์หัวใจพุ่ง
            for(let i=0; i<30; i++) {
                setTimeout(() => {
                    const h = document.createElement('div');
                    h.style.position = 'fixed';
                    h.style.left = '50%';
                    h.style.top = '50%';
                    h.innerHTML = '💖';
                    h.style.fontSize = '24px';
                    h.style.transition = 'all 2s';
                    h.style.zIndex = '110';
                    document.body.appendChild(h);
                    
                    const x = (Math.random() - 0.5) * 1000;
                    const y = (Math.random() - 0.5) * 1000;
                    
                    setTimeout(() => {
                        h.style.transform = `translate(${x}px, ${y}px)`;
                        h.style.opacity = '0';
                    }, 100);
                    setTimeout(() => h.remove(), 2000);
                }, i * 50);
            }
        }

        function closeMemory() {
            document.getElementById('memory-overlay').style.display = 'none';
        }
    </script>
</body>
</html>
